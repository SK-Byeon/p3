<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>내 지갑을 풍족하게, 공무원 주식 추천</title>
  <style>
    :root {
      --bg-0: #030712;
      --bg-1: #081a3f;
      --bg-2: #0b2b66;
      --card: rgba(6, 14, 36, 0.82);
      --ink: #eaf3ff;
      --sub: #9fb6dc;
      --line: rgba(131, 160, 214, 0.28);
      --accent: #2d7dff;
      --accent-2: #5ba9ff;
      --chip: rgba(19, 37, 78, 0.86);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SUIT Variable", "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 400px at 12% -10%, rgba(62, 120, 255, 0.45) 0%, transparent 60%),
        radial-gradient(700px 340px at 88% 0%, rgba(50, 97, 214, 0.35) 0%, transparent 58%),
        linear-gradient(170deg, var(--bg-2) 0%, var(--bg-1) 36%, var(--bg-0) 85%);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1080px;
      margin: 28px auto 42px;
      padding: 0 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      box-shadow:
        0 14px 36px rgba(2, 8, 24, 0.55),
        inset 0 1px 0 rgba(196, 218, 255, 0.08);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      pointer-events: none;
      background:
        radial-gradient(500px 120px at 30% -5%, rgba(88, 152, 255, 0.22), transparent 68%),
        radial-gradient(520px 130px at 85% -10%, rgba(72, 121, 223, 0.2), transparent 72%);
      z-index: 0;
    }
    .card > * {
      position: relative;
      z-index: 1;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
    }
    .action-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .globe-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(150, 186, 246, 0.45);
      background: radial-gradient(circle at 30% 30%, #98d5ff 0%, #3d87ff 38%, #0e3d98 82%);
      box-shadow: 0 0 22px rgba(89, 151, 255, 0.45);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      padding: 0;
    }
    .globe-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 26px rgba(107, 168, 255, 0.58);
    }
    .top-action {
      border: 1px solid rgba(128, 159, 219, 0.35);
      background: var(--chip);
      color: #d6e8ff;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .top-action:hover {
      transform: translateY(-1px);
      border-color: rgba(176, 206, 255, 0.72);
    }
    .neon-title {
      margin: 0 0 8px;
      line-height: 1.25;
      font-size: clamp(24px, 4.4vw, 40px);
      letter-spacing: 0.01em;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1px;
    }
    .neon-char {
      display: inline-block;
      font-weight: 900;
      color: hsl(var(--h), 100%, 88%);
      -webkit-text-stroke: 0.4px rgba(9, 27, 58, 0.55);
      text-shadow:
        0 0 2px hsla(var(--h), 100%, 85%, 0.95),
        0 0 8px hsla(var(--h), 100%, 70%, 0.65),
        0 0 14px hsla(var(--h), 100%, 62%, 0.4);
      animation:
        neonBoot 2.8s ease-out both,
        neonFlicker 4.4s linear infinite,
        breathing 2.6s ease-in-out infinite;
      animation-delay: var(--d, 0ms), calc(var(--d, 0ms) + 420ms), calc(var(--d, 0ms) + 420ms);
      transform-origin: 50% 55%;
    }
    .neon-space {
      width: 0.5ch;
      display: inline-block;
    }
    @keyframes neonBoot {
      0% {
        opacity: 0.22;
        filter: brightness(0.22) saturate(0.65);
        text-shadow:
          0 0 0 hsla(var(--h), 100%, 72%, 0),
          0 0 0 hsla(var(--h), 100%, 65%, 0),
          0 0 0 hsla(var(--h), 100%, 60%, 0);
      }
      55% {
        opacity: 0.64;
        filter: brightness(0.62) saturate(0.9);
      }
      100% {
        opacity: 1;
        filter: brightness(1) saturate(1);
        text-shadow:
          0 0 2px hsla(var(--h), 100%, 85%, 0.95),
          0 0 8px hsla(var(--h), 100%, 70%, 0.65),
          0 0 14px hsla(var(--h), 100%, 62%, 0.4);
      }
    }
    @keyframes neonFlicker {
      0%, 100% { opacity: 1; filter: brightness(1); }
      8% { opacity: 0.88; filter: brightness(1.08); }
      14% { opacity: 1; filter: brightness(1); }
      29% { opacity: 0.9; filter: brightness(1.06); }
      46% { opacity: 1; filter: brightness(1); }
      72% { opacity: 0.89; filter: brightness(1.08); }
      86% { opacity: 1; filter: brightness(1.01); }
    }
    @keyframes breathing {
      0%, 100% { transform: scale(0.98); }
      50% { transform: scale(1.04); }
    }
    .desc {
      margin: 0 0 16px;
      color: var(--sub);
      font-size: 14px;
      max-width: 840px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    button {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #256dff, #58a6ff);
      color: #fff;
      font-weight: 700;
      padding: 12px 20px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(49, 120, 255, 0.36);
    }
    button:disabled { opacity: 0.65; cursor: not-allowed; }
    .status {
      min-height: 20px;
      color: #b5caf0;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .result {
      display: none;
      margin-top: 14px;
      padding-top: 18px;
      border-top: 1px solid rgba(128, 160, 218, 0.28);
    }
    .kpi {
      margin: 6px 0;
      font-size: 17px;
      font-weight: 700;
    }
    .reason {
      background: rgba(9, 22, 54, 0.82);
      border: 1px solid rgba(131, 164, 226, 0.28);
      border-radius: 14px;
      padding: 14px;
      line-height: 1.5;
      margin: 10px 0;
      font-size: 14px;
      color: #e5f0ff;
    }
    .reason-layout {
      display: grid;
      grid-template-columns: 1fr 230px;
      gap: 12px;
      align-items: start;
    }
    .link-rail {
      border: 1px solid rgba(131, 164, 226, 0.28);
      border-radius: 14px;
      background: rgba(10, 20, 47, 0.85);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .home-btn {
      display: block;
      border-radius: 10px;
      border: 1px solid rgba(131, 167, 229, 0.35);
      background: rgba(13, 30, 67, 0.95);
      color: #d8e9ff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      padding: 10px 8px;
      text-align: center;
      line-height: 1.2;
      transition: transform 0.16s ease, border-color 0.16s ease;
    }
    .home-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(168, 200, 255, 0.7);
    }
    .reason-yellow {
      color: #ffe76a;
      font-weight: 900;
    }
    .political-hint {
      display: none;
      margin: 10px 0 12px;
      border: 1px solid rgba(139, 173, 235, 0.34);
      border-radius: 12px;
      background: rgba(10, 22, 54, 0.86);
      padding: 10px;
      align-items: center;
      gap: 10px;
    }
    .political-hint img {
      width: 90px;
      height: 90px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid rgba(156, 189, 244, 0.5);
    }
    .political-hint .hint-text {
      font-size: 13px;
      line-height: 1.45;
      color: #d9e9ff;
    }
    ul {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    li {
      margin: 0;
      border: 1px solid rgba(128, 160, 220, 0.24);
      background: linear-gradient(165deg, rgba(16, 34, 75, 0.95), rgba(8, 18, 41, 0.95));
      border-radius: 12px;
      padding: 12px;
      min-height: 86px;
      transition: transform 0.22s ease, border-color 0.22s ease;
    }
    li:hover {
      transform: translateY(-3px);
      border-color: rgba(146, 182, 247, 0.54);
    }
    a { color: #d9e9ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .foot {
      margin-top: 14px;
      font-size: 12px;
      color: #8ea7d1;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      background: rgba(8, 24, 56, 0.95);
      border: 1px solid rgba(141, 178, 239, 0.45);
      color: #e4f0ff;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      z-index: 50;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.hide {
      opacity: 0;
      transform: translateX(-50%) translateY(8px);
    }
    @media (max-width: 740px) {
      .card { padding: 18px; }
      .topbar { align-items: flex-start; flex-wrap: wrap; }
      .action-group { justify-content: flex-start; }
      .reason-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">

    </section>
  </main>

    function setStatus(msg) {

    function startProgressStatus(base) {

      const dots = [".", "..", "..."];
      progressFrame = 0;

      progressTimer = setInterval(() => {
        progressFrame = (progressFrame + 1) % dots.length;
        setStatus(`${base}${dots[progressFrame]}`);
      }, 420);
    }

    function stopProgressStatus() {
      if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.remove("hide");
      toastEl.classList.add("show");
      setTimeout(() => {
        toastEl.classList.remove("show");
        toastEl.classList.add("hide");
      }, 2000);
    }

    function normalize(text) {
      return (text || "").replace(/\s+/g, " ").trim().toLowerCase();
    }

    function uniq(arr) {
      return [...new Set(arr)];
    }

    function rememberStock(stock, themeName) {
      const code = stock && stock.ticker;
      if (!code) return;
      recentStockCodes.push(code);
      if (recentStockCodes.length > RECENT_WINDOW) {
        recentStockCodes.shift();
      }
      lastStockCode = code;
      if (themeName) {
        recentThemes.push(themeName);
        if (recentThemes.length > RECENT_WINDOW) recentThemes.shift();
        lastThemeName = themeName;
      }
      if (stock.country) {
        recentCountries.push(stock.country);
        if (recentCountries.length > RECENT_WINDOW) recentCountries.shift();
        lastCountry = stock.country;
      }
    }

    function weightedPick(items) {
      const total = items.reduce((sum, it) => sum + it.weight, 0);
      let r = Math.random() * total;
      for (const it of items) {
        r -= it.weight;
        if (r <= 0) return it.value;
      }
      return items[items.length - 1].value;
    }

    function chooseTheme(scores) {
      const entries = Object.entries(scores);
      const positive = entries.filter(([, score]) => score > 0);
      const ranked = (positive.length ? positive : entries).sort((a, b) => b[1] - a[1]);
      const top = ranked.slice(0, Math.min(6, ranked.length));

      const preferred = top
        .filter(([theme]) => theme !== lastThemeName)
        .filter(([theme]) => !recentThemes.includes(theme));
      const pool = preferred.length ? preferred : top;

      // 전체가 한 테마로 쏠리지 않게, 가끔은 유머 테마도 의도적으로 탐색
      if (THEMES[FUN_THEME] && Math.random() < 0.12 && lastThemeName !== FUN_THEME) {
        return FUN_THEME;
      }

      const weighted = pool.map(([theme, score], idx) => ({
        value: theme,
        weight: (score + 1) + (pool.length - idx) * 0.35
      }));
      return weightedPick(weighted);
    }

    function pickFreshStock(themeName) {
      const stocks = (THEMES[themeName] && THEMES[themeName].stocks) || [];
      if (!stocks.length) return null;

      const byNotLast = stocks.filter((s) => s.ticker !== lastStockCode);
      const byNotRecentStock = byNotLast.filter((s) => !recentStockCodes.includes(s.ticker));
      const byCountry = byNotRecentStock.filter((s) => s.country !== lastCountry && !recentCountries.includes(s.country));
      const pool = byCountry.length ? byCountry : (byNotRecentStock.length ? byNotRecentStock : (byNotLast.length ? byNotLast : stocks));
      return pool[Math.floor(Math.random() * pool.length)];
    }

    const YAHOO_RSS_FEEDS = [
      "https://feeds.finance.yahoo.com/rss/2.0/headline?s=^GSPC&region=US&lang=en-US",
      "https://feeds.finance.yahoo.com/rss/2.0/headline?s=^IXIC&region=US&lang=en-US",
      "https://feeds.finance.yahoo.com/rss/2.0/headline?s=BTC-USD&region=US&lang=en-US"
    ];

    function normalizeYahooLink(url) {
      if (!url) return "";
      return url.replace(/^http:\/\//i, "https://");
    }

    function keepYahooNewsOnly(items) {
      const seen = new Set();
      const out = [];
      for (const it of items) {
        const title = (it.title || "").trim();
        const url = normalizeYahooLink((it.url || it.link || "").trim());
        if (!title || !url) continue;
        if (!url.includes("finance.yahoo.com/")) continue;
        const key = `${title}|${url}`;
        if (seen.has(key)) continue;
        seen.add(key);
        out.push({ title, url });
      }
      return out.slice(0, 50);
    }

    async function fetchViaRss2Json(feedUrl) {
      const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;
      const res = await fetch(api, { method: "GET" });
      if (!res.ok) throw new Error(`rss2json 오류: ${res.status}`);
      const data = await res.json();
      const items = Array.isArray(data.items) ? data.items : [];
      return items.map((x) => ({ title: x.title, url: x.link }));
    }

    function parseRssXml(xmlText) {
      const doc = new DOMParser().parseFromString(xmlText, "text/xml");
      const nodes = [...doc.querySelectorAll("item")];
      return nodes.map((n) => ({
        title: (n.querySelector("title")?.textContent || "").trim(),
        url: (n.querySelector("link")?.textContent || "").trim()
      }));
    }

    async function fetchViaAllOrigins(feedUrl) {
      const api = `https://api.allorigins.win/raw?url=${encodeURIComponent(feedUrl)}`;
      const res = await fetch(api, { method: "GET" });
      if (!res.ok) throw new Error(`allorigins 오류: ${res.status}`);
      const text = await res.text();
      return parseRssXml(text);
    }

    async function fetchMainNewsArticles() {
      const aggregated = [];
      let usedSource = "";

      for (const feed of YAHOO_RSS_FEEDS) {
        try {
          const items = await fetchViaRss2Json(feed);
          aggregated.push(...items);
          usedSource = "rss2json";
        } catch (e) {
          // 다음 소스로 fallback
        }
      }

      if (!aggregated.length) {
        for (const feed of YAHOO_RSS_FEEDS) {
          try {
            const items = await fetchViaAllOrigins(feed);
            aggregated.push(...items);
            usedSource = "allorigins";
          } catch (e) {
            // 다음 소스로 fallback
          }
        }
      }

      const articles = keepYahooNewsOnly(aggregated);
      if (!articles.length) {
        throw new Error("뉴스 소스 접근에 실패했습니다. 잠시 후 다시 시도해 주세요.");
      }
      return { articles, usedSource };
    }

    function scoreThemes(articles) {
      const scores = {};
      const hits = {};
      const hitKeywords = {};

      for (const theme of Object.keys(THEMES)) {
        scores[theme] = 0;
        hits[theme] = [];
        hitKeywords[theme] = [];
      }

      for (const article of articles) {
        const t = normalize(article.title);
        for (const [theme, meta] of Object.entries(THEMES)) {
          const matched = meta.keywords.find(k => t.includes(k.toLowerCase()));
          if (matched) {
            scores[theme] += 1;
            hits[theme].push(article);
            hitKeywords[theme].push(matched);
          }
        }
      }

      return { scores, hits, hitKeywords };
    }

    function buildReason(theme, stock, hitKeywords, articleCount) {
      const topKeywords = uniq(hitKeywords).slice(0, 5).join(", ") || "관련 키워드";
      const tail = theme === FUN_THEME
        ? "이 구간에서는 재미 포인트와 단기 이슈 반응성을 중심으로 과감하게 픽했습니다."
        : "지금 구간에서 강하게 우선순위 추천 후보로 제시합니다.";
      const detail =
        "이번 추천은 기사 제목 기반 키워드 적합도, 최근 추천 이력(테마/국가/종목) 분산 규칙, " +
        "그리고 현재 뉴스 모멘텀 강도를 함께 반영했습니다. " +
        "동일 테마 과집중을 줄이기 위해 상위 점수 테마 내 가중 선택을 적용했고, " +
        "국가 분산을 위해 직전 추천 국가와 최근 추천 국가를 회피하는 로직을 사용했습니다.";
      const base =
        `Yahoo Finance 메인 뉴스에서 '${theme}' 관련 신호가 확인되었습니다. ` +
        `주요 키워드는 ${topKeywords}이며, 관련 기사 ${articleCount}건을 근거로 ` +
        `${stock.name}(${stock.ticker}, ${stock.country})를 추천합니다. ${stock.why} ` +
        `${detail} ${tail}`;
      return base.length > 1000 ? base.slice(0, 1000) : base;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderHomeLinks(theme) {
      const stocks = (THEMES[theme] && THEMES[theme].stocks) || [];
      homeLinksEl.innerHTML = "";
      stocks.forEach((s) => {
        const a = document.createElement("a");
        a.className = "home-btn";
        a.href = s.home || "#";
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = `${s.name} 홈페이지`;
        homeLinksEl.appendChild(a);
      });
    }

    function renderPoliticalHint(theme, stock) {
      if (theme !== FUN_THEME || !stock.politicianHint) {
        politicalHintEl.style.display = "none";
        politicalHintImgEl.removeAttribute("src");
        politicalHintTextEl.textContent = "";
        return;
      }
      politicalHintImgEl.onerror = () => {
        politicalHintImgEl.style.display = "none";
      };
      politicalHintImgEl.style.display = "block";
      politicalHintImgEl.src = stock.politicianImage || "";
      politicalHintTextEl.textContent = `정치인 테마주 힌트: ${stock.politicianHint} 관련 테마로 시장에서 자주 언급됩니다.`;
      politicalHintEl.style.display = "flex";
    }

    function renderResult(theme, stock, reason, links) {
      themeEl.textContent = `테마: ${theme}`;
      stockEl.textContent = `추천 종목: ${stock.name} (${stock.ticker}, ${stock.country})`;
      const yellowTail = theme === FUN_THEME
        ? ` <span class="reason-yellow">웃자고 하는 거니 죽자고 매수 버튼으로 달려들진 마세요</span>`
        : "";
      reasonEl.innerHTML = `추천 사유(1000자 이내): ${escapeHtml(reason)}${yellowTail}`;
      renderHomeLinks(theme);
      renderPoliticalHint(theme, stock);
      linksEl.innerHTML = "";
      links.forEach((a) => {
        const li = document.createElement("li");
        const anchor = document.createElement("a");
        anchor.href = a.url;
        anchor.target = "_blank";
        anchor.rel = "noopener noreferrer";
        anchor.textContent = a.title || a.url;
        li.appendChild(anchor);
        linksEl.appendChild(li);
      });
      resultEl.style.display = "block";
    }

    async function run() {
      runBtn.disabled = true;
      resultEl.style.display = "none";
      setStatus("Yahoo Finance 뉴스 수집 중...");
      try {
        const { articles, usedSource } = await fetchMainNewsArticles();
        if (!articles.length) {
          throw new Error("메인 뉴스에서 분석 가능한 기사 링크를 찾지 못했습니다.");
        }
        startProgressStatus(`기사 ${articles.length}건 수집 완료(${usedSource}). 테마 분석 중`);

        const { scores, hits, hitKeywords } = scoreThemes(articles);
        const pickedTheme = chooseTheme(scores);
        const stock = pickFreshStock(pickedTheme);
        if (!stock) {
          throw new Error("추천 가능한 종목 목록이 비어 있습니다.");
        }
        const related = ((hits[pickedTheme] || []).length ? hits[pickedTheme] : articles).slice(0, 3);
        const reason = buildReason(pickedTheme, stock, hitKeywords[pickedTheme] || [], related.length);

        stopProgressStatus();
        renderResult(pickedTheme, stock, reason, related);
        rememberStock(stock, pickedTheme);
        setStatus("추천 완료");
      } catch (err) {
        stopProgressStatus();
        setStatus(`실패: ${err.message}`);
      } finally {
        stopProgressStatus();
        runBtn.disabled = false;
      }
    }

    function renderNeonTitle(text) {
      const neonTitle = document.getElementById("neonTitle");
      neonTitle.innerHTML = "";
      [...text].forEach((ch, idx) => {
        if (ch === " ") {
          const spacer = document.createElement("span");
          spacer.className = "neon-space";
          spacer.textContent = " ";
          neonTitle.appendChild(spacer);
          return;
        }
        const span = document.createElement("span");
        span.className = "neon-char";
        span.textContent = ch;
        const coolHue = 188 + ((idx * 17 + Math.floor(Math.random() * 18)) % 52);
        span.style.setProperty("--h", String(coolHue));
        span.style.setProperty("--d", `${idx * 42}ms`);
        neonTitle.appendChild(span);
      });
    }

    async function copyCurrentUrl() {
      try {
        await navigator.clipboard.writeText(window.location.href);
      } catch (e) {
        const temp = document.createElement("textarea");
        temp.value = window.location.href;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
      }
      showToast("주소가 복사되었습니다.");
    }

    function printPage() {
      window.print();
    }

    async function downloadPdf() {
      try {
        if (!window.html2canvas || !window.jspdf || !window.jspdf.jsPDF) {
          showToast("PDF 라이브러리 로드 실패: 인쇄를 이용해 주세요.");
          return;
        }
        const canvas = await window.html2canvas(document.body, {
          scale: 2,
          useCORS: true,
          backgroundColor: "#030712"
        });
        const imgData = canvas.toDataURL("image/jpeg", 0.95);
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF("p", "mm", "a4");
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const imgW = pageW;
        const imgH = (canvas.height * imgW) / canvas.width;

        let heightLeft = imgH;
        let y = 0;
        pdf.addImage(imgData, "JPEG", 0, y, imgW, imgH);
        heightLeft -= pageH;

        while (heightLeft > 0) {
          y = heightLeft - imgH;
          pdf.addPage();
          pdf.addImage(imgData, "JPEG", 0, y, imgW, imgH);
          heightLeft -= pageH;
        }
        pdf.save("stock-recommendation.pdf");
        showToast("PDF 다운로드가 시작되었습니다.");
      } catch (e) {
        showToast("PDF 생성에 실패했습니다. 인쇄를 이용해 주세요.");
      }
    }

    renderNeonTitle("내 지갑을 풍족하게, 공무원 주식 추천");
    globeBtn.addEventListener("click", () => {
      window.location.reload();
    });
    shareBtn.addEventListener("click", copyCurrentUrl);
    printBtn.addEventListener("click", printPage);
    downloadBtn.addEventListener("click", downloadPdf);
    runBtn.addEventListener("click", run);
  </script>
</body>
